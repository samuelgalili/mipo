name: CI/CD → Vercel + Mipo WhatsApp

on:
  push:
    branches: [main]
  workflow_dispatch:

# מניעת ריצות כפולות אם נדחפו כמה commits ברצף
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: TypeScript check + Vercel build
  # ──────────────────────────────────────────────
  build:
    name: ✅ TypeScript & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # vercel build = vite build אבל עם פורמט .vercel/output/ תקני
      # VITE_* env vars מוגדרים בפרויקט ב-Vercel dashboard
      - name: Vercel build
        run: vercel build --prod --yes

      - name: Upload .vercel/output artifact
        uses: actions/upload-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output/
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2: Deploy prebuilt artifact to Vercel
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    outputs:
      deploy_url: ${{ steps.deploy.outputs.url }}

    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: vercel-output
          path: .vercel/output/

      - name: Deploy prebuilt to production
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --yes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed → $URL"

  # ──────────────────────────────────────────────
  # JOB 3: Notify Mipo via OpenClaw → WhatsApp
  # ──────────────────────────────────────────────
  notify:
    name: 📲 Mipo WhatsApp Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    timeout-minutes: 5

    steps:
      - name: Send webhook to OpenClaw
        env:
          OPENCLAW_WEBHOOK_URL:    ${{ secrets.OPENCLAW_WEBHOOK_URL }}
          OPENCLAW_WEBHOOK_SECRET: ${{ secrets.OPENCLAW_WEBHOOK_SECRET }}
          DEPLOY_URL:              ${{ needs.deploy.outputs.deploy_url }}
          COMMIT_SHA:              ${{ github.sha }}
          COMMIT_MESSAGE:          ${{ github.event.head_commit.message }}
          ACTOR:                   ${{ github.actor }}
        run: |
          PAYLOAD=$(jq -n \
            --arg event      "deploy_success" \
            --arg deploy_url "$DEPLOY_URL" \
            --arg sha        "${COMMIT_SHA:0:7}" \
            --arg msg        "$COMMIT_MESSAGE" \
            --arg actor      "$ACTOR" \
            --arg ts         "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              event:      $event,
              deploy_url: $deploy_url,
              commit_sha: $sha,
              commit_msg: $msg,
              actor:      $actor,
              timestamp:  $ts,
              message:    ("🐾 MIPO עודכן בהצלחה!\n\n🔗 " + $deploy_url + "\n📝 " + $msg + "\n👤 " + $actor + "\n🔖 " + $sha)
            }')

          HTTP_STATUS=$(curl -s -o /tmp/wh.txt -w "%{http_code}" \
            -X POST "$OPENCLAW_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $OPENCLAW_WEBHOOK_SECRET" \
            --max-time 15 \
            --data "$PAYLOAD")

          echo "OpenClaw → HTTP $HTTP_STATUS"
          cat /tmp/wh.txt

          # לא נכשיל את ה-pipeline אם ה-webhook נכשל
          [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ] \
            && echo "✅ Mipo notified via WhatsApp" \
            || echo "⚠️ Webhook failed — deploy still succeeded"
          exit 0
