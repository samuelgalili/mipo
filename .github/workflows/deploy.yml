name: CI/CD → Vercel + Mipo WhatsApp

on:
  push:
    branches: [main]
  workflow_dispatch: # הרצה ידנית מ-GitHub UI / CLI

# מניעת ריצות כפולות אם נדחפו כמה commits ברצף
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: TypeScript + Build
  # ──────────────────────────────────────────────
  build:
    name: ✅ TypeScript & Vite Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Vite build
        env:
          VITE_SUPABASE_URL:      ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # שמירת תיקיית dist לשימוש ב-job הבא
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ──────────────────────────────────────────────
  # JOB 2: Deploy to Vercel
  # ──────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    outputs:
      deploy_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Deploy to production
        id: deploy
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed to: $URL"

  # ──────────────────────────────────────────────
  # JOB 3: Notify via OpenClaw → WhatsApp
  # ──────────────────────────────────────────────
  notify:
    name: 📲 Mipo WhatsApp Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()
    timeout-minutes: 5

    steps:
      - name: Send webhook to OpenClaw
        env:
          OPENCLAW_WEBHOOK_URL:    ${{ secrets.OPENCLAW_WEBHOOK_URL }}
          OPENCLAW_WEBHOOK_SECRET: ${{ secrets.OPENCLAW_WEBHOOK_SECRET }}
          DEPLOY_URL:              ${{ needs.deploy.outputs.deploy_url }}
          COMMIT_SHA:              ${{ github.sha }}
          COMMIT_MESSAGE:          ${{ github.event.head_commit.message }}
          ACTOR:                   ${{ github.actor }}
          REPO:                    ${{ github.repository }}
        run: |
          PAYLOAD=$(jq -n \
            --arg event       "deploy_success" \
            --arg deploy_url  "$DEPLOY_URL" \
            --arg commit_sha  "${COMMIT_SHA:0:7}" \
            --arg commit_msg  "$COMMIT_MESSAGE" \
            --arg actor       "$ACTOR" \
            --arg repo        "$REPO" \
            --arg timestamp   "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              event:       $event,
              deploy_url:  $deploy_url,
              commit_sha:  $commit_sha,
              commit_msg:  $commit_msg,
              actor:       $actor,
              repo:        $repo,
              timestamp:   $timestamp,
              message:     ("🐾 MIPO עודכן בהצלחה!\n\n🔗 " + $deploy_url + "\n📝 " + $commit_msg + "\n👤 " + $actor + "\n🔖 " + $commit_sha)
            }')

          HTTP_STATUS=$(curl -s -o /tmp/webhook_response.txt -w "%{http_code}" \
            -X POST "$OPENCLAW_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Webhook-Secret: $OPENCLAW_WEBHOOK_SECRET" \
            -H "X-GitHub-Event: push" \
            --max-time 15 \
            --data "$PAYLOAD")

          echo "OpenClaw response ($HTTP_STATUS):"
          cat /tmp/webhook_response.txt

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "⚠️ Webhook returned HTTP $HTTP_STATUS — deploy was still successful"
            exit 0  # לא נכשיל את ה-pipeline בגלל webhook
          fi

          echo "✅ Mipo notified via WhatsApp"
